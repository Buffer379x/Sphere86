worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;

    # Docker's internal DNS — needed for proxy_pass with capture group variables
    resolver 127.0.0.11 valid=30s;
    keepalive_timeout 65;
    client_max_body_size 8G;  # Allow large disk image uploads

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Server block rendered at startup by /docker-entrypoint.d/05-ssl-config.sh
    # from nginx/templates/{http,https}.conf.template based on env vars.
    include /etc/nginx/conf.d/*.conf;
}
